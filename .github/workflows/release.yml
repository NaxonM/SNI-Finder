name: Release Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release bundles
        run: python3 ./scripts/build_release_bundles.py

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sni-finder-release
          path: |
            release/sni-finder_windows_amd64_bundle.zip
            release/sni-finder_linux_amd64_bundle.tar.gz
            release/checksums.txt
            release/release_manifest.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: sni-finder-release
          path: dist

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > dist/release-notes.md

          if [[ ! -s dist/release-notes.md ]]; then
            {
              echo "Release ${tag}"
              echo
              echo "No changelog section found for ${tag} in CHANGELOG.md."
            } > dist/release-notes.md
          fi

      - name: Append runtime component versions to release notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f dist/release_manifest.json ]]; then
            python3 -c "import json,pathlib; d=json.loads(pathlib.Path('dist/release_manifest.json').read_text(encoding='utf-8')); s=d.get('sources',{}); sn=s.get('snispf',{}).get('tag','unknown'); xr=s.get('xray',{}).get('tag','unknown'); n=pathlib.Path('dist/release-notes.md'); n.write_text(n.read_text(encoding='utf-8') + '\n### Runtime Components\n- SNISPF Core: ' + sn + '\n- Xray Core: ' + xr + '\n', encoding='utf-8')"
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sni-finder_windows_amd64_bundle.zip
            dist/sni-finder_linux_amd64_bundle.tar.gz
            dist/checksums.txt
            dist/release_manifest.json
          body_path: dist/release-notes.md
          generate_release_notes: false
