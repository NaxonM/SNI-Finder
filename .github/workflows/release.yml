name: Release Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release bundles
        run: python3 ./scripts/build_release_bundles.py

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sni-finder-release
          path: |
            release/sni-finder_windows_amd64_bundle.zip
            release/sni-finder_linux_amd64_bundle.tar.gz
            release/checksums.txt
            release/release_manifest.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: sni-finder-release
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sni-finder_windows_amd64_bundle.zip
            dist/sni-finder_linux_amd64_bundle.tar.gz
            dist/checksums.txt
            dist/release_manifest.json
          generate_release_notes: true
