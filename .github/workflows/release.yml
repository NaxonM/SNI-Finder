name: Release Bundles

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build release bundles
        run: python3 ./scripts/build_release_bundles.py

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sni-finder-release
          path: |
            release/sni-finder_windows_amd64_bundle.zip
            release/sni-finder_linux_amd64_bundle.tar.gz
            release/checksums.txt
            release/release_manifest.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: sni-finder-release
          path: dist

      - name: Prepare release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" {in_section=1; next}
            in_section && $0 ~ "^## \\[" {exit}
            in_section {print}
          ' CHANGELOG.md > dist/release-notes.md

          if [[ ! -s dist/release-notes.md ]]; then
            {
              echo "Release ${tag}"
              echo
              echo "No changelog section found for ${tag} in CHANGELOG.md."
            } > dist/release-notes.md
          fi

      - name: Append runtime component versions to release notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f dist/release_manifest.json ]]; then
            python3 - <<'PY'
            import json
            from pathlib import Path

            manifest_path = Path("dist/release_manifest.json")
            notes_path = Path("dist/release-notes.md")

            data = json.loads(manifest_path.read_text(encoding="utf-8"))
            sources = data.get("sources", {})
            snispf = sources.get("snispf", {}).get("tag", "unknown")
            xray = sources.get("xray", {}).get("tag", "unknown")

            with notes_path.open("a", encoding="utf-8") as f:
                f.write("\n")
                f.write("### Runtime Components\n")
                f.write(f"- SNISPF Core: {snispf}\n")
                f.write(f"- Xray Core: {xray}\n")
            PY
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sni-finder_windows_amd64_bundle.zip
            dist/sni-finder_linux_amd64_bundle.tar.gz
            dist/checksums.txt
            dist/release_manifest.json
          body_path: dist/release-notes.md
          generate_release_notes: false
